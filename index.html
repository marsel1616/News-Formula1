<!DOCTYPE html>
<html>
<head>
  <title>News Formula-1</title>
  <style>
    /* Общий стиль страницы */
    body { 
      font-family: Arial, sans-serif; 
      background-color: #111;   /* темный фон */
      color: #fff;              /* белый текст */
      margin: 0; 
      padding: 20px; 
    }

    /* Заголовок сайта */
    h1 { 
      color: #e10600;           /* красный цвет Ferrari ;) */
      text-align: center;
    }

    /* Новости */
    .news { 
      border-bottom: 1px solid #444;  /* разделитель между новостями */
      padding: 15px 0; 
    }

    .news h2 { 
      color: #ffd700;           /* золотой для заголовков новостей */
      margin: 0; 
    }

    .news p { 
      margin: 5px 0 0 0; 
    }
  </style>
</head>
<body>

<h1>News Formula-1</h1>

<div class="news">
  <h2>Гран-при Австралии</h2>
  <p>Ferrari показала отличные результаты на старте сезона.</p>
</div>

<div class="news">
  <h2>Обновления болидов</h2>
  <p>Mercedes и Red Bull готовят новые улучшения к следующей гонке.</p>
</div>

</body>
</html>
